services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis-search-demo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis-search-demo-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: redis-search-demo
      RI_REDIS_DB: "0"
    volumes:
      - redisinsight-data:/data

volumes:
  redis-data:
  redisinsight-data:
