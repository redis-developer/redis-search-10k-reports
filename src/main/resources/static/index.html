<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis S&amp;P 500 10-K Retrieval Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css?v=20260407-limit-height">
</head>
<body>
    <header class="app-toolbar">
        <div class="app-toolbar__inner">
            <div class="toolbar-brand">
                <img src="/images/redis-logo.png" alt="Redis logo">
                <span class="toolbar-divider" aria-hidden="true"></span>
                <h1>10-K Retrieval</h1>
            </div>
        </div>
    </header>

    <main class="console-shell">
        <section class="control-dock">
            <div class="panel controls-panel">
                <form id="search-form" class="search-form">
                    <div class="form-row form-row-query">
                        <div class="field-group field-group-query">
                            <label for="query-input">Free-Text Query</label>
                            <textarea
                                id="query-input"
                                name="query"
                                rows="2"
                                required
                                placeholder="cloud demand, AI infrastructure, pricing pressure, supply chain exposure"
                            ></textarea>
                        </div>
                    </div>

                    <div class="form-grid form-grid-filters">
                        <div class="field-group autocomplete-field">
                            <label for="company-input">Company Name</label>
                            <input id="company-input" name="companyName" type="text" autocomplete="off" placeholder="Apple">
                            <div id="company-autocomplete" class="autocomplete-results hidden"></div>
                        </div>

                        <div class="field-group autocomplete-field">
                            <label for="ticker-input">Ticker</label>
                            <input id="ticker-input" name="ticker" type="text" autocomplete="off" placeholder="AAPL">
                            <div id="ticker-autocomplete" class="autocomplete-results hidden"></div>
                        </div>

                        <div class="field-group">
                            <label for="filing-year">Filing Year</label>
                            <select id="filing-year" name="filingYear">
                                <option value="FY2025" selected>FY2025</option>
                            </select>
                        </div>

                        <div class="field-group">
                            <label for="filing-date">Filing Date</label>
                            <input id="filing-date" name="filingDate" type="date">
                        </div>

                        <div class="field-group multi-select-field">
                            <label>Sectors</label>
                            <div class="multi-select" data-filter="sector">
                                <button type="button" class="multi-select-trigger" data-target="sector-options">
                                    <span class="trigger-text">All sectors</span>
                                    <span class="trigger-arrow">▾</span>
                                </button>
                                <div class="multi-select-panel hidden" id="sector-options">
                                    <input type="text" class="multi-select-search" placeholder="Filter sectors..." data-filter-search="sector">
                                    <div class="option-list" id="sector-list"></div>
                                </div>
                                <div class="selected-pills" id="sector-pills"></div>
                            </div>
                        </div>

                        <div class="field-group multi-select-field">
                            <label>Sections</label>
                            <div class="multi-select" data-filter="section">
                                <button type="button" class="multi-select-trigger" data-target="section-options">
                                    <span class="trigger-text">All sections</span>
                                    <span class="trigger-arrow">▾</span>
                                </button>
                                <div class="multi-select-panel hidden" id="section-options">
                                    <input type="text" class="multi-select-search" placeholder="Filter sections..." data-filter-search="section">
                                    <div class="option-list" id="section-list"></div>
                                </div>
                                <div class="selected-pills" id="section-pills"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-row form-row-modes">
                        <div class="mode-toggle" role="radiogroup" aria-label="Search mode">
                            <button type="button" class="mode-chip" data-mode="full-text">Full-Text</button>
                            <button type="button" class="mode-chip" data-mode="vector">Vector</button>
                            <button type="button" class="mode-chip active" data-mode="hybrid">Hybrid</button>
                        </div>
                        <div class="field-group field-group-limit">
                            <label for="limit-input">Limit</label>
                            <input id="limit-input" name="limit" type="number" min="1" max="100" step="1" value="20">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="primary-button">Run Retrieval</button>
                            <button type="button" id="reset-button" class="secondary-button">Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <div class="search-feedback">
            <div class="dataset-feedback-row">
                <div id="dataset-status" class="dataset-status">Dataset status unavailable</div>
                <button type="button" id="initialize-dataset-button" class="secondary-button dataset-action-button">Load Data</button>
            </div>
            <div id="search-status" class="search-status hidden" aria-live="polite"></div>
        </div>

        <section class="panel results-panel">
            <div class="results-header">
                <div>
                    <span class="results-kicker">Results</span>
                    <h2 id="results-heading">Chunk-Level Matches</h2>
                </div>
                <p id="results-subtitle" class="results-subtitle">
                    Run retrieval to inspect ranked FY2025 filing chunks.
                </p>
            </div>

            <div id="single-results-view" class="single-results-view">
                <div id="single-results" class="results-list"></div>
            </div>
        </section>
    </main>

    <script src="/js/script.js?v=20260407-required-query"></script>
</body>
</html>
